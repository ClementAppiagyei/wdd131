<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="layout using placeholder content for text and images.">
    <meta name="author" content="Appiagyei Clement | Layout">
    <title>Layout</title>
    <link rel="stylesheet" href="style/layout.css">
</head>
<body>
    <!-- Header of the page. This is where you see all the on top of the browser such as logo, home, about, etc. -->
    <header>
        <h1 contenteditable> Header Content </h1>
        <nav>
            <ul>
                <li><a href="#"> Home </a></li>
                <li><a href="#"> Project </a></li>
                <li><a href="#"> Service </a></li>
                <li><a href="#"> Contact </a></li>
            </ul>
        </nav>
    </header>

    <!-- Main part of the page. This is where most of the work is done where you see all the content between the header and the footer. -->
    <main>
        <section>
            <h2 contenteditable> Section </h2>
            <p> eowojwnlwdipweeeeennnnnqpnejcccccccjeookkkkkmlekwpqkmedpqmwdqpiwdj </p>
        </section>
        <aside>
            <img src="/images/#" alt="my-profile.jpg">
        </aside>
    </main>

     <!-- Footer, this is the later part of the page, which is located at the bottom part of the page -->
    <footer>
        <h3 contenteditable> Footer Content </h3>
    </footer>

</body>
</html>
